resource-pack-server:
  # When your server is running, you can test that the pack is accessible by not being on the same network and
  # visit your servers IP and this port (e.g. clans.bounceme.net:5335) on your browser and if it is working it
  # will download the pack as it is just a HTTP server.

  server-ip: "localhost" # "clans.bounceme.net" # The public-facing IP or domain name of this server, if debugging then you can use "localhost"
  port: 5335 # This port must be opened & allowed through any firewall, this is the port that players will download the resource pack from.

resource-pack:
  # The next 3 fields will be used to create the pack.mcmeta file in the root of the
  # resource pack.
  description: "A resource pack generated with PackMan."
  min-format: 84
  max-format: 84

  glyphs:
    # The character range you wish to override for your glyphs, change
    # this if you are using other custom glyph plugins, as there will be
    # conflict if they use the same areas.
    # by default this is the Private Use Area:
    #   https://jrgraphix.net/r/Unicode/E000-F8FF
    range-min: 57344 # In hex this is 0xE000
    range-max: 63743 # In hex this is 0xF8FF

messages:
  gave-item: "<grey>[</grey><blue>packman</blue><grey>]</grey> <grey>Gave <white>%amount%</white>x <white>%pack_name%:%item_name%</white> to <yellow>%player_name%</yellow></grey>"
  reloaded: "<grey>[</grey><blue>packman</blue><grey>]</grey> <grey>Reloaded all packs (%num_packs% packs), restarted the HTTP server, and sent the updated pack to all online players.</grey>"
  list-glyph-header: "<grey>[</grey><blue>packman</blue><grey>]</grey> ============== <u><yellow><click:run_command:packman glyph list %page-1%><<</click></yellow></u> page %page% / %max_page% <u><yellow><click:run_command:packman glyph list %page+1%>>></click></yellow></u> =============="
  list-glyph: "<grey>  - <hover:show_text:\"%glyph%\"><u><white>%pack_name%</white>:<white>%item_name%</white></u></hover></grey>"
  list-glyph-no-more: "<grey>  - No more glyphs.</grey>"